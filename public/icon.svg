<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Learning Vault">
  <defs>
    <linearGradient id="leather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b1d1d"/>
      <stop offset="48%" stop-color="#3d1010"/>
      <stop offset="100%" stop-color="#2b0a0a"/>
    </linearGradient>
    <radialGradient id="highlight" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8a2a2a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8a2a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="grain" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
    <radialGradient id="pageGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C9A961" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- leather cover -->
  <rect width="512" height="512" rx="84" fill="url(#leather)"/>
  <rect width="512" height="512" rx="84" fill="url(#highlight)"/>
  <rect width="512" height="512" rx="84" fill="url(#grain)"/>

  <!-- embossed double gold border -->
  <rect x="44" y="44" width="424" height="424" rx="38"
        fill="none" stroke="#B8924D" stroke-width="4" opacity="0.92"/>
  <rect x="60" y="60" width="392" height="392" rx="28"
        fill="none" stroke="#C9A961" stroke-width="1.2" opacity="0.55"/>

  <!-- top ornament -->
  <line x1="120" y1="130" x2="220" y2="130" stroke="#B8924D" stroke-width="3" opacity="0.78"/>
  <line x1="292" y1="130" x2="392" y2="130" stroke="#B8924D" stroke-width="3" opacity="0.78"/>
  <circle cx="256" cy="130" r="6" fill="none" stroke="#C9A961" stroke-width="2.2"/>
  <circle cx="256" cy="130" r="2" fill="#C9A961"/>

  <!-- soft warm glow behind the book -->
  <ellipse cx="256" cy="310" rx="160" ry="80" fill="url(#pageGlow)"/>

  <!-- Open book emblem, engraved in gold -->
  <g stroke="#C9A961" stroke-linejoin="round" stroke-linecap="round">

    <!-- left page (slight curve along top and bottom suggests open spread) -->
    <path d="M 124 256
             Q 192 244 252 286
             L 252 370
             Q 192 358 124 364 Z"
          fill="#3a2614" fill-opacity="0.35"
          stroke-width="3.5"/>

    <!-- right page -->
    <path d="M 388 256
             Q 320 244 260 286
             L 260 370
             Q 320 358 388 364 Z"
          fill="#3a2614" fill-opacity="0.35"
          stroke-width="3.5"/>

    <!-- center spine -->
    <line x1="256" y1="286" x2="256" y2="370" stroke-width="2.2" opacity="0.85"/>

    <!-- text lines on left page (slight fanning) -->
    <g stroke-width="2" opacity="0.65">
      <line x1="146" y1="296" x2="240" y2="300"/>
      <line x1="146" y1="316" x2="240" y2="320"/>
      <line x1="146" y1="336" x2="240" y2="340"/>
    </g>

    <!-- text lines on right page -->
    <g stroke-width="2" opacity="0.65">
      <line x1="272" y1="300" x2="366" y2="296"/>
      <line x1="272" y1="320" x2="366" y2="316"/>
      <line x1="272" y1="340" x2="366" y2="336"/>
    </g>
  </g>

  <!-- bottom ornament: rules + central diamond -->
  <line x1="120" y1="408" x2="220" y2="408" stroke="#B8924D" stroke-width="2.5" opacity="0.72"/>
  <line x1="292" y1="408" x2="392" y2="408" stroke="#B8924D" stroke-width="2.5" opacity="0.72"/>
  <path d="M 244 408 L 256 398 L 268 408 L 256 418 Z"
        fill="none" stroke="#C9A961" stroke-width="1.8" opacity="0.85"/>
</svg>
